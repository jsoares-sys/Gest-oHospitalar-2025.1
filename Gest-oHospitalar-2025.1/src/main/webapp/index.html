<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"> <!-- Incluir Font Awesome -->
    <link rel="stylesheet" href="./css/index.css">
    <title>Faça seu Login</title>
</head>
<body>
    <div class="wrapper">
        <div class="image-container">
            <img src="./img/login.jpg" alt="Imagem ilustrativa de login">
        </div>
        
        <div class="container">
            <h1>Seja Bem-Vindo ao nosso Sistema</h1>
    
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Digite seu Email:" required>
    
            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="Digite sua senha:" required>
            
            <div class="checkbox-container">
                <label class="checkbox-label">
                    <input type="checkbox" class="lembre-me-checkbox">
                    Lembre-me
                </label>
            </div>

            <a href="#" class="forgot-password">Esqueci a senha</a>
    
            <button type="submit">Entrar</button>
            
            <p>Não tem uma conta? <a href="cadastro.html" class="forgot-password">Cadastre-se</a></p>

            <!-- Redes sociais com ícones -->
            <div class="social-links">
                <p>Entrar com:</p>
                <a href="#" class="facebook"><i class="fab fa-facebook"></i></a>
                <a href="#" class="instagram"><i class="fab fa-instagram"></i></a>
                <a href="#" class="icloud"><i class="fab fa-apple"></i></a>
            </div>            
        </div>
    </div>
</body>
</html>
