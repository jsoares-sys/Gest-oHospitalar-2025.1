<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="./css/cadastro.css">

    <title>Cadastro</title>
      
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <h1>Crie sua Conta</h1>
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" placeholder="Digite seu nome" required>
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Digite seu email" required>
            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="Digite sua senha" required>
            <label for="confirmar-senha">Confirme sua Senha</label>
            <input type="password" id="confirmar-senha" placeholder="Confirme sua senha" required>
            <button type="submit">Cadastrar</button>
            <p>Já tem uma conta? <a href="index.html" class="forgot-password">Faça login</a></p>
        </div>
        <div class="image-container">
            <img src="./img/login.jpg" alt="Imagem ilustrativa de cadastro">
        </div>
    </div>
</body>
</html>
